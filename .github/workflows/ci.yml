name: CI

# Fast, secret-free gate: typecheck + lint + unit tests + UI tests + build.
# Runs on every push to main and every PR. Also exposed as a reusable
# workflow (workflow_call) so deploy.yml can require it before shipping.

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Project is bun-based: root + astro/ each have their own
      # bun.lock and all package scripts shell out to bun.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Worker deps (root)
        run: bun install --frozen-lockfile

      - name: Install frontend deps (astro/)
        working-directory: astro
        run: bun install --frozen-lockfile

      - name: Typecheck (tsc --noEmit, root tsconfig)
        run: bun run check

      - name: Lint (eslint src/**/*.ts)
        run: bun run lint

      - name: Migration GRANT guardrail
        run: bun run check:migrations

      - name: Unit tests (vitest — src/tests/** + astro/src/lib/**)
        run: bun run test

      - name: UI component tests (jsdom)
        run: bun run test:ui

      - name: Build frontend (astro → astro/dist)
        run: bun run build:ui
