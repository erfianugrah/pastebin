<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Pasteriser</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --bg: hsl(220 20% 97%);
      --fg: hsl(222 28% 12%);
      --card: hsl(0 0% 100%);
      --muted: hsl(220 10% 40%);
      --primary: hsl(221.2 83.2% 53.3%);
      --primary-fg: hsl(210 40% 98%);
      --border: hsl(220 13% 84%);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: hsl(224 71% 4%);
        --fg: hsl(210 40% 98%);
        --card: hsl(223 47% 11%);
        --muted: hsl(215 20.2% 65.1%);
        --primary: hsl(217.2 91.2% 59.8%);
        --primary-fg: hsl(222.2 47.4% 11.2%);
        --border: hsl(217.2 32.6% 22%);
      }
    }

    body {
      font-family: "Inter Variable", "Inter", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      max-width: 24rem;
      padding: 2.5rem 2rem;
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      background: var(--card);
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      letter-spacing: -0.01em;
    }

    p {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.6;
      margin: 0 0 1.5rem;
    }

    .btn {
      display: inline-block;
      background: var(--primary);
      color: var(--primary-fg);
      padding: 0.5rem 1.25rem;
      border-radius: 0.375rem;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="logo" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="256" height="256" rx="60" fill="url(#g)"/>
      <path d="M90 76L56 128L90 180" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M166 76L200 128L166 180" stroke="white" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M140 64L116 192" stroke="white" stroke-width="16" stroke-linecap="round"/>
      <defs>
        <linearGradient id="g" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#4F46E5"/>
          <stop offset="1" stop-color="#3B82F6"/>
        </linearGradient>
      </defs>
    </svg>

    <h1>You're offline</h1>
    <p>Check your internet connection and try again.</p>
    <button class="btn" id="retry">Retry</button>
  </div>

  <script>
    document.getElementById('retry').addEventListener('click', () => window.location.reload());
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>
