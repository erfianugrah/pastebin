<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!--
    Pasteriser brutalist favicon.
    Yellow square + hard black border + blocky "P" mark drawn with
    rectangles only (no font dependency for SVG-to-PNG rasterisation).
    Tokens match the UI: bg #ffcc00 (primary), fg #0a0a0a (foreground).
  -->
  <rect width="256" height="256" fill="#ffcc00"/>
  <rect x="0" y="0" width="256" height="256" fill="none" stroke="#0a0a0a" stroke-width="16"/>
  <!-- P glyph: stem + top arm + right side of bowl + closing arm -->
  <rect x="56"  y="56"  width="32"  height="144" fill="#0a0a0a"/>
  <rect x="56"  y="56"  width="120" height="32"  fill="#0a0a0a"/>
  <rect x="144" y="56"  width="32"  height="96"  fill="#0a0a0a"/>
  <rect x="56"  y="120" width="120" height="32"  fill="#0a0a0a"/>
</svg>
