<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!--
    Pasteriser brutalist OG card.
    Yellow primary background + black hard border + wordmark + tagline.
    Rasterised to og-image.png via `magick -background none og-image.svg og-image.png`.
    Tokens match the UI: bg #ffcc00 (primary), fg #0a0a0a (foreground).
  -->
  <rect width="1200" height="630" fill="#ffcc00"/>
  <rect x="0" y="0" width="1200" height="630" fill="none" stroke="#0a0a0a" stroke-width="40"/>

  <!-- Wordmark (heavy mono) -->
  <text x="600" y="270" font-family="Iosevka, 'Iosevka Term', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
        font-size="140" font-weight="900" fill="#0a0a0a" text-anchor="middle" letter-spacing="8">PASTERISER</text>

  <!-- Tagline -->
  <text x="600" y="360" font-family="Iosevka, 'Iosevka Term', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
        font-size="32" font-weight="500" fill="#0a0a0a" text-anchor="middle" letter-spacing="2"
        text-transform="uppercase">— code · text · markdown · encrypted —</text>

  <!-- Bottom rule + URL -->
  <line x1="120" y1="500" x2="1080" y2="500" stroke="#0a0a0a" stroke-width="4"/>
  <text x="600" y="555" font-family="Iosevka, 'Iosevka Term', 'JetBrains Mono', 'Fira Code', 'Courier New', monospace"
        font-size="36" font-weight="700" fill="#0a0a0a" text-anchor="middle" letter-spacing="3">paste.erfi.io</text>
</svg>
