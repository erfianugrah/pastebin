<h2>Reset your Pasteriser password</h2>

<p>Click the link below to set a new password. The link will sign you in temporarily so you can choose a new password.</p>
<p><a href="{{ .SiteURL }}/auth/confirm?token_hash={{ .TokenHash }}&type=recovery&next=/auth/reset-password">Reset password</a></p>

<p>If you didn't request a password reset, you can safely ignore this email.</p>
